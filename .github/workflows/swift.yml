name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Swift environment
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: "6.2"
        
    - name: Setup Cairo Linux
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev
        
    - name: Setup Cairo Windows
      if: ${{ matrix.os == 'windows-latest' }}
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: mingw-w64-x86_64-cairo

    - name: Build
      run: swift build -v

    - name: Run tests
      run: swift test -v
      
    - name: Archive rendered S-101
      uses: actions/upload-artifact@v4
      with:
        name: rendered-s101-${{ matrix.os }}
        path: /tmp/101*png
        retention-days: 5
